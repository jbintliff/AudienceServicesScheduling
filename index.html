<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Scheduling Hub</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1e2d34;
        color: #f7f4ef;
      }
      body { margin:0; background:linear-gradient(160deg,#1f3038 0%,#2a424d 42%,#24343d 100%); min-height:100vh; }
      * { box-sizing:border-box; }
      .app { width:100%; max-width:none; margin:0; padding:24px; }
      .panel { background: rgba(18,30,36,0.82); border:1px solid rgba(181,208,219,0.38); border-radius:16px; padding:18px; backdrop-filter: blur(10px); }
      h1,h2,h3 { margin-top:0; }
      .grid { display:grid; gap:16px; grid-template-columns: 1.05fr 0.95fr; }
      .stack { display:grid; gap:12px; }
      .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
      input, select, button, textarea { font:inherit; padding:10px 12px; border-radius:10px; border:1px solid #7ea3b2; background:#1d3139; color:#f7f4ef; }
      textarea { min-height:72px; resize:vertical; }
      button { cursor:pointer; background:#d36a62; border:none; color:#ffffff; font-weight:600; transition: transform .15s ease, filter .15s ease; }
      button:hover { transform: translateY(-1px); }
      button:hover, button:focus-visible { filter: brightness(1.08); }
      button.secondary { background:#4d6f7a; color:#f7f4ef; }
      button.danger { background:#9d4c48; color:#fff4f2; }
      button.success { background:#8bc3c7; color:#102125; }
      button:disabled { opacity:0.58; cursor:not-allowed; filter:none; }
      .app.calendar-view button { padding:5px 8px; font-size:0.78rem; line-height:1.1; border-radius:7px; }
      .pill { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; background:#ecc6b8; color:#1f2f35; font-size:0.9rem; }
      .chip { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; background:#cdb29d; color:#1f2f35; font-size:0.85rem; }
      .agent-list, .shift-list, .template-list, .request-list { display:grid; gap:10px; }
      .card { border:1px solid rgba(150,183,196,0.38); border-radius:12px; padding:12px; background:rgba(45,71,81,0.58); }
      .muted { color:#e8ddcc; font-size:0.9rem; }
      .stats { display:grid; gap:10px; grid-template-columns: repeat(4, minmax(0,1fr)); }
      .stat { padding:12px; border-radius:12px; background:rgba(58,92,104,0.65); }
      .day-row { display:grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap:8px; }
      .day-card { min-height:160px; padding:10px; border-radius:12px; background:rgba(29,49,57,0.88); border:1px solid rgba(137,172,185,0.42); }
      .day-card h4 { margin:0 0 8px; font-size:0.95rem; }
      .day-card .shift { margin-bottom:6px; padding:6px; border-radius:8px; background:#d36a62; font-size:0.85rem; cursor:grab; }
      .day-card .shift.selected { box-shadow: 0 0 0 2px #FDD592, 0 0 0 4px rgba(96,129,134,0.55); }
      .day-card.drag-over { border-color:#FDD592; box-shadow: inset 0 0 0 1px #FDD592; }
      .status-badge { display:inline-flex; padding:4px 8px; border-radius:999px; font-size:0.8rem; background:#355664; color:#eef5f8; }
      .status-badge.pending { background:#FDD592; color:#4B3A1F; }
      .status-badge.approved { background:#7AACAF; color:#17383B; }
      .status-badge.rejected { background:#AB5C57; color:#FFF1EF; }
      .app.calendar-view .calendar-admin-bulk-actions,
      .app.calendar-view .calendar-shift-actions {
        gap: 6px;
        flex-wrap: nowrap;
        overflow-x: auto;
        scrollbar-width: thin;
        padding-bottom: 2px;
      }
      .app.calendar-view .calendar-admin-bulk-actions button,
      .app.calendar-view .calendar-shift-actions button {
        flex: 0 0 auto;
        white-space: nowrap;
        padding: 4px 7px;
        font-size: 0.72rem;
        line-height: 1.05;
        border-radius: 6px;
      }
      @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr 1fr; } .day-row { grid-template-columns: 1fr 1fr; } }
      @media (max-width: 700px) { .stats { grid-template-columns: 1fr; } .day-row { grid-template-columns: 1fr; } }
    </style>
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#608186" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__SCHEDULER_API_URL__ = window.__SCHEDULER_API_URL__ || localStorage.getItem('agent-scheduler-backend-url-v1') || 'https://scheduling-app-backend-l66q.onrender.com/api';
    </script>
    <script src="app.js?v=20260716-5"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        }).catch(() => {});
      }
      if ('caches' in window) {
        caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))).catch(() => {});
      }
    </script>
  </body>
</html>
