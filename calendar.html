<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar View | Agent Scheduling Hub</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #608186;
        color: #fff7ef;
      }
      body { margin:0; background:linear-gradient(160deg,#608186 0%,#7AACAF 45%,#6B6B6E 100%); min-height:100vh; }
      * { box-sizing:border-box; }
      .app { max-width: 1400px; margin:0 auto; padding:24px; }
      .panel { background: rgba(107,107,110,0.34); border:1px solid rgba(253,213,146,0.35); border-radius:16px; padding:18px; backdrop-filter: blur(10px); }
      h1,h2,h3 { margin-top:0; }
      .grid { display:grid; gap:16px; grid-template-columns: 1.05fr 0.95fr; }
      .stack { display:grid; gap:12px; }
      .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
      input, select, button, textarea { font:inherit; padding:10px 12px; border-radius:10px; border:1px solid #C49583; background:#6B6B6E; color:#fff7ef; }
      button { cursor:pointer; background:#D0645E; border:none; transition: transform .15s ease; }
      button:hover { transform: translateY(-1px); }
      button.secondary { background:#AB5C57; }
      button.danger { background:#AB5C57; }
      button.success { background:#7AACAF; color:#13282B; }
      .pill { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; background:#F4A997; color:#2E2422; font-size:0.9rem; }
      .chip { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; background:#C49583; color:#2E2422; font-size:0.85rem; }
      .agent-list, .shift-list, .template-list, .request-list { display:grid; gap:10px; }
      .card { border:1px solid rgba(253,213,146,0.35); border-radius:12px; padding:12px; background:rgba(171,92,87,0.22); }
      .muted { color:#FDD592; font-size:0.9rem; }
      .stats { display:grid; gap:10px; grid-template-columns: repeat(4, minmax(0,1fr)); }
      .stat { padding:12px; border-radius:12px; background:rgba(196,149,131,0.3); }
      .day-row { display:grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap:8px; }
      .day-card { min-height:160px; padding:10px; border-radius:12px; background:rgba(107,107,110,0.58); border:1px solid rgba(253,213,146,0.35); }
      .day-card h4 { margin:0 0 8px; font-size:0.95rem; }
      .day-card .shift { margin-bottom:6px; padding:6px; border-radius:8px; background:#D0645E; font-size:0.85rem; cursor:grab; }
      .day-card.drag-over { border-color:#FDD592; box-shadow: inset 0 0 0 1px #FDD592; }
      .status-badge { display:inline-flex; padding:4px 8px; border-radius:999px; font-size:0.8rem; background:#6B6B6E; }
      .status-badge.pending { background:#FDD592; color:#4B3A1F; }
      .status-badge.approved { background:#7AACAF; color:#17383B; }
      .status-badge.rejected { background:#AB5C57; color:#FFF1EF; }
      @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr 1fr; } .day-row { grid-template-columns: 1fr 1fr; } }
      @media (max-width: 700px) { .stats { grid-template-columns: 1fr; } .day-row { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body data-page="calendar">
    <script>
      if (window.location.pathname.toLowerCase().endsWith('/calendar.html')) {
        window.location.replace('index.html?view=calendar');
      }
    </script>
    <div id="root"></div>
    <script>
      window.__SCHEDULER_API_URL__ = window.__SCHEDULER_API_URL__ || localStorage.getItem('agent-scheduler-backend-url-v1') || 'https://scheduling-app-backend-l66q.onrender.com/api';
    </script>
    <script src="app.js?v=20260716-5"></script>
  </body>
</html>
